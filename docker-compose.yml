version: '3.8'

services:
  # Web Server (Nginx)
  nginx:
    image: nginx:stable-alpine
    container_name: reportmycity_nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/reportmycity
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - rmc_network

  # Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reportmycity_app
    volumes:
      - .:/var/www/reportmycity
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=reportmycity
    depends_on:
      - mongodb
    networks:
      - rmc_network

  # Database (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: reportmycity_mongodb
    ports:
      - "27018:27017"
    volumes:
      - ./mongodb_data:/data/db
    networks:
      - rmc_network

networks:
  rmc_network:
    driver: bridge
